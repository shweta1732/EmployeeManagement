version: '3.8'

services:
  # SQL Server Database
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: employee-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Admin@123456"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - employee-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Admin@123456" -Q "SELECT 1"
      interval: 10s
      timeout: 3s
      retries: 3

  # .NET Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: employee-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Docker"
      ASPNETCORE_URLS: "http://+:5000"
      ConnectionStrings__DefaultConnection: "Server=mssql;Database=EmployeeManagement;User Id=sa;Password=Admin@123456;TrustServerCertificate=true;"
      Jwt__Issuer: "EmployeeManagementAPI"
      Jwt__Audience: "EmployeeManagementUI"
      Jwt__Key: "YourSuperSecretKeyThatIsAtLeast32CharactersLong12345"
    ports:
      - "5000:5000"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - employee-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/swagger/index.html"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Angular Frontend
  frontend:
    build:
      context: ./employee-management-ui
      dockerfile: Dockerfile
    container_name: employee-ui
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - employee-network
    environment:
      API_URL: "http://backend:5000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  sqldata:

networks:
  employee-network:
    driver: bridge
