<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Departments</h2>
    <button class="btn btn-success" (click)="add()">+ Add Department</button>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="mb-3">
        <input
          matInput
          (keyup)="applyFilter($event)"
          placeholder="Search departments..."
          class="form-control"
        />
      </div>

      <div *ngIf="dataSource.data.length > 0; else noData">
        <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8 w-100">

          <!-- Name Column -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Department Name</th>
            <td mat-cell *matCellDef="let element">
              <strong>{{ element.name }}</strong>
            </td>
          </ng-container>

          <!-- Description -->
          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef>Description</th>
            <td mat-cell *matCellDef="let element">{{ element.description || '-' }}</td>
          </ng-container>

          <!-- Actions -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let element">
              <button class="btn btn-sm btn-primary me-2" (click)="edit(element)">Edit</button>
              <button class="btn btn-sm btn-danger" (click)="delete(element)">Delete</button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
        <mat-paginator [pageSizeOptions]="[5, 10, 20]"></mat-paginator>
      </div>

      <ng-template #noData>
        <p class="text-muted text-center py-4">No departments found. <a href="#" (click)="add(); $event.preventDefault()">Create one now</a></p>
      </ng-template>
    </div>
  </div>
</div>

<style>
  .card {
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    border: none;
  }
</style>
