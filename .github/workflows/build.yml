name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Build and Test Backend (.NET)
  build-backend:
    runs-on: ubuntu-latest
    name: Build Backend (.NET 10)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages
        run: dotnet restore EmployeeManagement.sln

      - name: Build solution
        run: dotnet build EmployeeManagement.sln -c Release --no-restore

      - name: Run backend tests
        run: dotnet test EmployeeManagement.Tests/EmployeeManagement.Tests.csproj -c Release --no-build --verbosity normal

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: EmployeeManagement.API/bin/Release/net10.0/publish

  # Job 2: Build and Test Frontend (Angular)
  build-frontend:
    runs-on: ubuntu-latest
    name: Build Frontend (Angular 19)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './employee-management-ui/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ./employee-management-ui

      - name: Lint code
        run: npm run lint
        working-directory: ./employee-management-ui
        continue-on-error: true

      - name: Build Angular application
        run: npm run build
        working-directory: ./employee-management-ui

      - name: Run frontend tests
        run: npm test -- --watch=false --browsers=ChromeHeadless
        working-directory: ./employee-management-ui
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: employee-management-ui/dist

  # Job 3: Security scanning
  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET for SAST
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore EmployeeManagement.sln

      - name: Analyze code with Roslyn analyzers
        run: dotnet build EmployeeManagement.sln -c Release /p:EnforceCodeStyleInBuild=true
        continue-on-error: true

  # Job 4: Build and push Docker images
  build-docker:
    runs-on: ubuntu-latest
    name: Build Docker Images
    needs: [ build-backend, build-frontend ]
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./employee-management-ui
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Docker images locally (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: employee-api:test

      - name: Build frontend Docker image locally (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./employee-management-ui
          push: false
          tags: employee-ui:test

  # Job 5: Prepare deployment
  prepare-deployment:
    runs-on: ubuntu-latest
    name: Prepare Deployment
    needs: [ build-backend, build-frontend, security-scan ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: ./artifacts/backend

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./artifacts/frontend

      - name: Display artifacts
        run: |
          echo "Backend artifacts:"
          ls -la ./artifacts/backend || echo "No backend artifacts found"
          echo "Frontend artifacts:"
          ls -la ./artifacts/frontend || echo "No frontend artifacts found"

      - name: Upload artifacts for deployment
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: ./artifacts

  # Job 6: Notify completion
  notify:
    runs-on: ubuntu-latest
    name: Notify Build Status
    needs: [ build-backend, build-frontend ]
    if: always()
    
    steps:
      - name: Determine build status
        run: |
          if [ "${{ needs.build-backend.result }}" == "success" ] && [ "${{ needs.build-frontend.result }}" == "success" ]; then
            echo "✅ All builds completed successfully!"
            exit 0
          else
            echo "❌ One or more builds failed"
            exit 1
          fi
